name: Daily digest

on:
  schedule:
    # 10:00 UTC = 6am EDT (5am EST). Runs every morning. GitHub cron is UTC-only
    # and does not follow US daylight-saving time, so the local hour shifts by one
    # between EDT and EST — see README if you want it pinned to exactly 6am ET.
    - cron: "0 10 * * *"
  workflow_dispatch: {}   # lets you trigger a run by hand from the Actions tab

# Allow the workflow to commit the new digest back to the repo.
permissions:
  contents: write

# Don't let two runs overlap.
concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate today's digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_digest.py

      - name: Commit and push if there are changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily digest $(date -u +%Y-%m-%d)"
            git push
          fi
